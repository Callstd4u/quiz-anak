<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Tebak Hewan</title>
    <style>
        /* Base Styles & Kids-Friendly Fonts */
        :root {
            --bg-color: #f0fdf4; /* Soft pastel green */
            --card-bg: #ffffff;
            --primary: #93c5fd; /* Soft blue */
            --primary-hover: #60a5fa;
            --text-main: #334155;
            --correct: #86efac; /* Soft green */
            --wrong: #fca5a5; /* Soft red */
            --progress-bg: #e2e8f0;
            --progress-fill: #fcd34d; /* Soft yellow */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Screens */
        .screen {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .screen.active {
            display: block;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Typography */
        h1 {
            font-size: 2rem;
            color: #475569;
            margin-bottom: 20px;
        }
        
        .clue-text {
            font-size: 1.5rem;
            margin: 20px 0;
            line-height: 1.4;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Progress Bar */
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: bold;
            color: #64748b;
        }

        .progress-container {
            width: 100%;
            height: 15px;
            background-color: var(--progress-bg);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--progress-fill);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            background-color: #f8fafc;
            border: 3px solid var(--primary);
            border-radius: 20px;
            padding: 20px 10px;
            font-size: 3.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        .option-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(147, 197, 253, 0.4);
            background-color: #eff6ff;
        }

        .option-btn:active {
            transform: scale(0.95);
        }

        .option-btn.disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        .option-btn.correct {
            background-color: var(--correct);
            border-color: #4ade80;
            animation: pop 0.4s ease;
        }

        .option-btn.wrong {
            background-color: var(--wrong);
            border-color: #f87171;
            animation: shake 0.4s ease;
        }

        .option-label {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 10px;
            color: #64748b;
        }

        /* Buttons */
        .primary-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 20px;
            font-family: inherit;
        }

        .primary-btn:hover {
            background-color: var(--primary-hover);
            transform: scale(1.05);
        }

        /* Feedback Message */
        .feedback-message {
            font-size: 2rem;
            font-weight: bold;
            min-height: 40px;
            margin: 15px 0;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .feedback-message.show {
            opacity: 1;
            animation: pop 0.3s ease;
        }
        .text-correct { color: #16a34a; }
        .text-wrong { color: #dc2626; }

        /* Mascot/Icons */
        .mascot {
            font-size: 5rem;
            margin-bottom: 10px;
        }

        .result-score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-hover);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <div class="mascot">🦁🐒🐬</div>
            <h1>Kuis Tebak Hewan</h1>
            <p>Ayo bermain sambil belajar mengenal hewan-hewan lucu!</p>
            <button class="primary-btn" onclick="startQuiz()">Mulai Main! 🚀</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="progress-header">
                <span>Soal: <span id="current-question-num">1</span>/20</span>
                <span>Skor: <span id="current-score">0</span></span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="clue-text" id="clue-text">
                <!-- Clue goes here -->
            </div>

            <div class="feedback-message" id="feedback-message"></div>

            <div class="options-grid" id="options-grid">
                <!-- Options injected by JS -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <div id="result-mascot" class="mascot">🏆</div>
            <h1>Permainan Selesai!</h1>
            <div class="result-score">
                <span id="final-score">0</span> / 20
            </div>
            <p id="result-message" style="font-size: 1.5rem; margin-bottom: 20px;"></p>
            <button class="primary-btn" onclick="resetQuiz()">Main Lagi 🔄</button>
        </div>

    </div>

    <script>
        // Quiz Data
        const quizData = [
            { clue: "Aku punya belalai panjang dan telinga besar.", options: ["🐘", "🦒", "🦏"], answer: "🐘" },
            { clue: "Aku suka makan pisang dan berayun di pohon.", options: ["🐒", "🦁", "🐯"], answer: "🐒" },
            { clue: "Aku raja hutan dan punya surai yang lebat.", options: ["🦁", "🐻", "🐺"], answer: "🦁" },
            { clue: "Leherku sangat panjang untuk makan daun di pohon tinggi.", options: ["🦒", "🦓", "🐪"], answer: "🦒" },
            { clue: "Aku hewan yang punya bulu bergaris hitam dan putih.", options: ["🦓", "🐎", "🐄"], answer: "🦓" },
            { clue: "Aku punya capit, bisa berenang, dan berjalan miring.", options: ["🦀", "🐙", "🦑"], answer: "🦀" },
            { clue: "Aku ikan besar yang menakutkan dan punya gigi sangat tajam.", options: ["🦈", "🐬", "🐳"], answer: "🦈" },
            { clue: "Aku sangat pintar dan suka melompat di air laut.", options: ["🐬", "🐟", "🐡"], answer: "🐬" },
            { clue: "Aku hewan laut yang punya delapan lengan.", options: ["🐙", "🦑", "🦀"], answer: "🐙" },
            { clue: "Aku berjalan sangat lambat dan selalu membawa rumahku.", options: ["🐢", "🦎", "🐊"], answer: "🐢" },
            { clue: "Aku suka berkokok di pagi hari. 'Kukuruyuk!'", options: ["🐓", "🦆", "🐦"], answer: "🐓" },
            { clue: "Aku menghasilkan susu yang lezat. 'Moo!'", options: ["🐄", "🐃", "🐐"], answer: "🐄" },
            { clue: "Aku suka berguling di lumpur. 'Oink oink!'", options: ["🐖", "🐑", "🐎"], answer: "🐖" },
            { clue: "Buluku sangat tebal dan bisa dibuat baju hangat. 'Mbek!'", options: ["🐑", "🐐", "🐄"], answer: "🐑" },
            { clue: "Aku suka mengeong dan pintar menangkap tikus.", options: ["🐈", "🐕", "🐇"], answer: "🐈" },
            { clue: "Aku teman setia manusia dan suka menggonggong.", options: ["🐕", "🐈", "🦊"], answer: "🐕" },
            { clue: "Telingaku panjang dan aku sangat suka makan wortel.", options: ["🐇", "🐿️", "🦔"], answer: "🐇" },
            { clue: "Aku burung yang bisa menirukan suara manusia.", options: ["🦜", "🦚", "🦉"], answer: "🦜" },
            { clue: "Aku hewan besar berwarna hitam putih, suka makan bambu.", options: ["🐼", "🐻", "🐨"], answer: "🐼" },
            { clue: "Aku suka melompat jauh dan punya kantung di perutku.", options: ["🦘", "🐪", "🦙"], answer: "🦘" }
        ];

        // State Variables
        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswering = false; // To prevent multiple clicks

        // DOM Elements
        const screens = {
            start: document.getElementById('start-screen'),
            quiz: document.getElementById('quiz-screen'),
            result: document.getElementById('result-screen')
        };
        const elements = {
            questionNum: document.getElementById('current-question-num'),
            score: document.getElementById('current-score'),
            progressBar: document.getElementById('progress-bar'),
            clueText: document.getElementById('clue-text'),
            optionsGrid: document.getElementById('options-grid'),
            feedbackMsg: document.getElementById('feedback-message'),
            finalScore: document.getElementById('final-score'),
            resultMsg: document.getElementById('result-message'),
            resultMascot: document.getElementById('result-mascot')
        };

        // Utility Function to shuffle an array
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Switch visible screen
        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        // Initialize and Start Quiz
        function startQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            updateScoreUI();
            showScreen('quiz');
            loadQuestion();
        }

        // Load specific question
        function loadQuestion() {
            isAnswering = false;
            const currentQuiz = quizData[currentQuestionIndex];
            
            // Update UI Counters
            elements.questionNum.innerText = currentQuestionIndex + 1;
            const progressPercent = ((currentQuestionIndex) / quizData.length) * 100;
            elements.progressBar.style.width = `${progressPercent}%`;
            
            // Set Text & Clear Feedback
            elements.clueText.innerHTML = `"${currentQuiz.clue}"`;
            elements.feedbackMsg.classList.remove('show');
            elements.feedbackMsg.innerText = "";
            elements.feedbackMsg.className = "feedback-message";

            // Shuffle options and render buttons
            elements.optionsGrid.innerHTML = '';
            const labels = ['A', 'B', 'C'];
            const shuffledOptions = shuffleArray(currentQuiz.options);

            shuffledOptions.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerHTML = `
                    ${option}
                    <span class="option-label">${labels[index]}</span>
                `;
                button.onclick = () => handleAnswer(option, button, currentQuiz.answer);
                elements.optionsGrid.appendChild(button);
            });
        }

        // Handle User Selection
        function handleAnswer(selectedOption, buttonElement, correctAnswer) {
            if (isAnswering) return;
            isAnswering = true;

            // Disable all buttons immediately
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(btn => btn.classList.add('disabled'));

            const isCorrect = (selectedOption === correctAnswer);

            if (isCorrect) {
                score++;
                updateScoreUI();
                buttonElement.classList.add('correct');
                showFeedback("Benar! 🎉", "text-correct");
            } else {
                buttonElement.classList.add('wrong');
                showFeedback("Salah! 😢", "text-wrong");
                
                // Optional: highlight correct answer
                allButtons.forEach(btn => {
                    if (btn.innerHTML.includes(correctAnswer)) {
                        btn.style.borderColor = "#4ade80"; // Highlight correct
                    }
                });
            }

            // Wait 1 second before going to next question
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < quizData.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1000);
        }

        // Show feedback text overlay
        function showFeedback(text, colorClass) {
            elements.feedbackMsg.innerText = text;
            elements.feedbackMsg.className = `feedback-message show ${colorClass}`;
        }

        // Update score text
        function updateScoreUI() {
            elements.score.innerText = score;
        }

        // End Quiz & Show Results
        function showResults() {
            // Fill final progress bar to 100%
            elements.progressBar.style.width = "100%";
            
            setTimeout(() => {
                showScreen('result');
                elements.finalScore.innerText = score;
                
                let message = "";
                let mascot = "";

                if (score === quizData.length) {
                    message = "Sempurna! Kamu Hebat Sekali! 🌟";
                    mascot = "👑";
                } else if (score >= 15) {
                    message = "Pintar! Kerja Bagus! 👍";
                    mascot = "🦊";
                } else if (score >= 10) {
                    message = "Bagus! Terus Belajar ya! 📚";
                    mascot = "🐣";
                } else {
                    message = "Jangan Menyerah! Coba Lagi! 💪";
                    mascot = "🐢";
                }

                elements.resultMsg.innerText = message;
                elements.resultMascot.innerText = mascot;
            }, 300); // slight delay for smooth transition
        }

        // Reset Quiz state
        function resetQuiz() {
            startQuiz();
        }

    </script>
</body>
</html>
